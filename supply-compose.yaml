services:
  ram-check:
    image: busybox
    restart: "no"
    command: >
      /bin/sh -c "
        TOTAL_KB=$$(awk '/MemTotal/ {print $$2}' /proc/meminfo);
        MIN_KB=8388608;
        TOTAL_MB=$$((TOTAL_KB / 1024));
        MIN_MB=$$((MIN_KB / 1024));
        echo \"RAM available: $${TOTAL_MB} MB — minimum required: $${MIN_MB} MB\";
        if [ \"$$TOTAL_KB\" -lt \"$$MIN_KB\" ]; then
          echo \"WARNING: Insufficient RAM ($${TOTAL_MB} MB). Ollama will not start — the app runs without LLM support.\";
          exit 1;
        fi;
        echo \"RAM check passed.\";
      "

  db:
    image: postgres:12.9
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: bluesupplydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bluesupplydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    depends_on:
      ram-check:
        condition: service_completed_successfully
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # GPU support — uncomment the block below if the host has an NVIDIA GPU
    # and the nvidia-container-toolkit is installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3.2:3b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    profiles:
      - init

  supply-svc:
    build:
      context: .
      dockerfile: supply-svc/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/bluesupplydb
      - DB_USERNAME=postgres
      - DB_PASSWORD=docker
      - OLLAMA_BASE_URL=http://ollama:11434
      # OLLAMA_MODEL is auto-set by /supply-entrypoint.sh based on GPU detection.
      # Override here to force a specific model (e.g. OLLAMA_MODEL=llama3.1:70b).
    depends_on:
      db:
        condition: service_healthy

volumes:
  ollama_data:
  postgres_data:

networks:
  host:
    driver: bridge
