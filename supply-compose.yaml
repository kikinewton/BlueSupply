services:
  db:
    image: postgres:12.9
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: bluesupplydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bluesupplydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ | grep -q Ollama || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # GPU support — uncomment the block below if the host has an NVIDIA GPU
    # and the nvidia-container-toolkit is installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      if nvidia-smi > /dev/null 2>&1 || rocm-smi > /dev/null 2>&1; then
        echo "GPU/neural engine detected — pulling llama3.1:8b";
        MODEL="llama3.1:8b";
      else
        echo "No accelerator found — pulling qwen2.5:7b";
        MODEL="qwen2.5:7b";
      fi;
      OLLAMA_HOST=http://ollama:11434 ollama pull $$MODEL
    profiles:
      - init

  supply-svc:
    build:
      context: .
      dockerfile: supply-svc/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/bluesupplydb
      - DB_USERNAME=postgres
      - DB_PASSWORD=docker
      - OLLAMA_BASE_URL=http://ollama:11434
      # OLLAMA_MODEL is auto-set by /supply-entrypoint.sh based on GPU detection.
      # Override here to force a specific model (e.g. OLLAMA_MODEL=llama3.1:70b).
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:

networks:
  host:
    driver: bridge
